<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexora Word-Scanner v1.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 針對手機鍵盤彈出時的滾動優化 */
        body { -webkit-overflow-scrolling: touch; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col items-center justify-start p-4 md:p-8 font-sans text-slate-800 antialiased selection:bg-slate-200">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-sm border border-slate-200/80 p-5 md:p-6 mt-2 mb-8">
        
        <div class="flex items-center justify-between mb-6">
            <div>
                <h1 class="text-xl font-bold text-slate-900 tracking-tight">Word-Scanner</h1>
                <p class="text-slate-400 text-[11px] mt-0.5">X 光單字透視儀 · Mobile v1.2</p>
            </div>
            <span class="bg-slate-100 text-slate-600 text-[9px] px-2 py-0.5 rounded font-mono border border-slate-200/60">
                1.00% COVERAGE
            </span>
        </div>

        <div class="space-y-3">
            <div class="flex flex-col gap-2">
                <input id="wordInput" type="text" inputmode="search" placeholder="輸入單字，例如: cat, interaction..." 
                       class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-slate-900 focus:bg-white font-mono text-base transition">
                
                <div class="flex gap-2">
                    <button id="scanBtn" class="flex-1 bg-slate-900 hover:bg-slate-800 text-white py-3 rounded-xl font-bold transition active:scale-95 shadow-sm text-sm">
                        開始掃描
                    </button>
                    <button id="clearBtn" class="bg-slate-100 hover:bg-slate-200 text-slate-500 px-4 rounded-xl text-sm transition">
                        清除
                    </button>
                </div>
            </div>
            <div id="statusNotice" class="text-xs font-medium text-rose-500 hidden px-1"></div>
        </div>

        <div id="loadingArea" class="hidden text-center py-8 text-slate-400 text-xs font-mono animate-pulse">
            🔍 Scanning word core structures...
        </div>

        <div id="resultArea" class="hidden mt-6 space-y-5">
            
            <div class="flex items-baseline justify-between border-b border-slate-100 pb-2.5">
                <div class="flex items-baseline gap-2">
                    <h3 class="text-2xl font-mono font-bold text-slate-900 uppercase tracking-wide" id="resultWord">WORD</h3>
                    <span id="resultPhonetic" class="text-xs text-slate-400 font-mono">/音標/</span>
                </div>
                <span id="partOfSpeechTag" class="text-[9px] bg-slate-100 text-slate-600 border border-slate-200 px-1.5 py-0.5 rounded font-mono font-bold uppercase">POS</span>
            </div>
            
            <div class="bg-slate-900 text-white p-4 rounded-xl shadow-sm">
                <span class="text-[9px] text-slate-400 block uppercase font-bold font-mono tracking-wider">中文語義</span>
                <p class="text-white text-lg font-bold mt-0.5" id="chineseTranslation">翻譯載入中...</p>
            </div>

            <div class="px-1">
                <span class="text-[9px] text-slate-400 block uppercase font-bold font-mono tracking-wider">English Definition</span>
                <p class="text-slate-600 text-xs leading-relaxed mt-1" id="totalMeaning">載入中...</p>
            </div>

            <div class="bg-slate-50 border border-slate-200/80 p-4 rounded-xl space-y-2.5 hidden" id="etymonAnnotationBlock">
                <div class="flex items-center gap-1.5">
                    <div class="w-1 h-3 bg-slate-900 rounded-full"></div>
                    <span class="text-[10px] font-bold text-slate-800 uppercase tracking-wider font-mono">X 光結構加註</span>
                </div>
                <div id="componentList" class="space-y-1.5 text-xs"></div>
            </div>
            
            <div id="exampleBlock" class="space-y-3 hidden">
                <span class="text-[9px] font-bold text-slate-400 block uppercase tracking-wider px-1">Contextual Use Cases (情境與雙語對照)</span>
                <div id="exampleList" class="space-y-3"></div>
            </div>

        </div>

        <div id="errorArea" class="hidden text-center py-8 text-rose-500 text-xs border border-dashed border-rose-200 rounded-xl bg-rose-50/50 mt-6">
            ❌ 查無此字，請確認拼字是否正確。
        </div>
    </div>

    <script>
        // 字根大數據矩陣（全面擴充，具備自動中文映射機制）
        const etymonEngine = {
            prefixes: [
                { code: "trans", mean: "橫過/轉移 (across)" }, { code: "contra", mean: "反對/相反 (against)" },
                { code: "inter", mean: "在...之間 (between)" }, { code: "sub", mean: "在...之下 (under)" },
                { code: "con", mean: "共同/加強 (together)" }, { code: "com", mean: "共同/一起 (together)" },
                { code: "dis", mean: "否定/分離 (not)" }, { code: "pre", mean: "在...之前 (before)" },
                { code: "pro", mean: "向前/支持 (forward)" }, { code: "re", mean: "再次/向後 (again)" },
                { code: "in", mean: "進入/否定 (into/not)" }, { code: "un", mean: "不/相反 (not)" }
            ],
            roots: [
                { code: "port", mean: "搬運/攜帶 (carry)" }, { code: "dict", mean: "言語/說話 (speak)" },
                { code: "vis", mean: "看見/視線 (see)" }, { code: "spect", mean: "觀看/審視 (look)" },
                { code: "scrib", mean: "書寫/記錄 (write)" }, { code: "script", mean: "書寫/文本 (write)" },
                { code: "tract", mean: "拉引/抽取 (pull)" }, { code: "press", mean: "擠壓/按壓 (press)" },
                { code: "duct", mean: "引導/帶領 (lead)" }, { code: "bio", mean: "生命/生物 (life)" },
                { code: "geo", mean: "土地/地球 (earth)" }, { code: "log", mean: "研究/學說 (study)" }
            ],
            suffixes: [
                { code: "logy", mean: "學科/研究 (study of)" }, { code: "tion", mean: "動作或狀態名詞" },
                { code: "ize", mean: "使成為 (動詞化)" }, { code: "ible", mean: "可...的 (形容詞化)" },
                { code: "able", mean: "能...的 (形容詞化)" }, { code: "er", mean: "從事者/工具 (名詞化)" },
                { code: "ous", mean: "充滿...的 (形容詞化)" }, { code: "al", mean: "具有...特性的" }
            ]
        };

        const wordInput = document.getElementById('wordInput');
        const statusNotice = document.getElementById('statusNotice');

        // 一鍵清除功能 (手機族最愛)
        document.getElementById('clearBtn').addEventListener('click', () => {
            wordInput.value = '';
            wordInput.focus();
        });

        // ====== 查詢主發動核心 ======
        async function masterSearch() {
            const word = wordInput.value.trim().toLowerCase();
            
            // 收起手機鍵盤
            wordInput.blur();

            // 重置 UI
            statusNotice.classList.add('hidden');
            document.getElementById('resultArea').classList.add('hidden');
            document.getElementById('errorArea').classList.add('hidden');
            document.getElementById('exampleBlock').classList.add('hidden');
            document.getElementById('etymonAnnotationBlock').classList.add('hidden');

            if (!word) { statusNotice.innerText = "⚠️ 請輸入英文單字。"; statusNotice.classList.remove('hidden'); return; }
            if (/[^a-zA-Z]/.test(word)) { statusNotice.innerText = "⚠️ 僅支援純英文字母。"; statusNotice.classList.remove('hidden'); return; }

            document.getElementById('loadingArea').classList.remove('hidden');

            let cloudDict = null;
            let mainChinese = "";
            let translatedExamples = [];

            try {
                // 1. 抓取大字典
                const dictRes = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
                if (dictRes.ok) {
                    const dictData = await dictRes.json();
                    if (Array.isArray(dictData)) cloudDict = dictData[0];
                }

                // 2. 雙向 AI 翻譯整合（確保單字與例句都有中文）
                // 我們一次把單字和要翻譯的內容打包送給翻譯引擎，優化速度
                const transRes = await fetch(`https://api.mymemory.translated.net/get?q=${word}&langpair=en|zh-TW`);
                if (transRes.ok) {
                    const transData = await transRes.json();
                    if (transData && transData.responseData) mainChinese = transData.responseData.translatedText;
                }

                // 如果字典裡有英文例句，異步為每個英文例句線上生成中文對照 (A+B 完美解)
                if (cloudDict && cloudDict.meanings) {
                    let tempExamples = [];
                    cloudDict.meanings.forEach(m => {
                        m.definitions.forEach(d => {
                            if (d.example && tempExamples.length < 3) { // 手機版限制最多3條，避免滑到手酸
                                tempExamples.push({
                                    eng: d.example,
                                    pos: m.partOfSpeech
                                });
                            }
                        });
                    });

                    // 為抓到的所有例句進行動態中文翻譯生成
                    for (let item of tempExamples) {
                        try {
                            const exTransRes = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(item.eng)}&langpair=en|zh-TW`);
                            if (exTransRes.ok) {
                                const exTransData = await exTransRes.json();
                                translatedExamples.push({
                                    eng: item.eng,
                                    zht: exTransData.responseData.translatedText,
                                    pos: item.pos
                                });
                            }
                        } catch(e) {
                            translatedExamples.push({ eng: item.eng, zht: "點擊例句查看延伸語境", pos: item.pos });
                        }
                    }
                }

            } catch (err) {
                console.error(err);
            }

            document.getElementById('loadingArea').classList.add('hidden');

            if (cloudDict || mainChinese) {
                document.getElementById('resultArea').classList.remove('hidden');
                document.getElementById('resultWord').innerText = word;
                document.getElementById('chineseTranslation').innerText = mainChinese || "未知語義";
                document.getElementById('resultPhonetic').innerText = cloudDict && cloudDict.phonetic ? cloudDict.phonetic : '';
                
                const pos = cloudDict && cloudDict.meanings[0] ? cloudDict.meanings[0].partOfSpeech : '詞彙';
                const def = cloudDict && cloudDict.meanings[0] ? cloudDict.meanings[0].definitions[0].definition : 'Definition listed below.';
                document.getElementById('partOfSpeechTag').innerText = pos;
                document.getElementById('totalMeaning').innerText = def;

                // ====== 100% 動態字根透視演算法 ======
                const componentList = document.getElementById('componentList');
                componentList.innerHTML = '';
                let hasAnnotation = false;

                // 智慧結構掃描
                etymonEngine.prefixes.forEach(p => {
