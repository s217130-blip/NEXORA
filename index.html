<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>多益智能出題系統</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen p-6 md:p-12 flex justify-center items-start">

  <div class="w-full max-w-3xl bg-white rounded-2xl shadow-sm border border-slate-200 p-6 md:p-8 space-y-6">
    
    <div>
      <h1 class="text-2xl font-black text-slate-900">多益 AI 智能出題機</h1>
      <p class="text-slate-500 text-sm mt-1">後端安全保護版 · 免輸入金鑰</p>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <div>
        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">選擇難度</label>
        <select id="difficulty" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-slate-900">
          <option value="初級 (多益 550 分水準)">初級 (550分)</option>
          <option value="中級 (多益 750 分水準)">中級 (750分)</option>
          <option value="高級 (多益 900 分水準)">高級 (900分)</option>
        </select>
      </div>
      <div>
        <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">選擇情境類別</label>
        <select id="category" class="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-slate-900">
          <option value="商務會議 (Meetings)">商務會議</option>
          <option value="辦公室溝通 (Office)">辦公室溝通</option>
          <option value="人事與招募 (Personnel)">人事與招募</option>
          <option value="採購與合約 (Purchasing)">採購與合約</option>
        </select>
      </div>
    </div>

    <button id="genBtn" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-3 rounded-xl transition text-sm">
      🚀 生成多益考題
    </button>

    <div id="loading" class="hidden text-center py-8 text-sm text-slate-500">⏳ AI 正在精心出題中...</div>

    <div id="quizArea" class="hidden border border-slate-200 rounded-xl p-5 space-y-4 bg-slate-50/50">
      <div class="bg-slate-900 text-white text-[10px] font-bold px-2 py-0.5 rounded w-max uppercase tracking-wider">Part 5 單字文法題</div>
      
      <p id="qText" class="text-slate-900 font-mono text-base font-semibold leading-relaxed"></p>
      
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-3" id="optionsBlock"></div>

      <div id="analysisBlock" class="hidden border-t border-slate-200 pt-4 mt-2 space-y-2">
        <p class="text-sm font-bold text-emerald-600">正確答案：<span id="correctAns"></span></p>
        <p class="text-xs text-slate-700 leading-relaxed"><span class="font-bold">中文翻譯：</span><span id="qTrans"></span></p>
        <p class="text-xs text-slate-500 leading-relaxed"><span class="font-bold">核心解析：</span><span id="qExpl"></span></p>
      </div>
    </div>

  </div>

  <script>
    const genBtn = document.getElementById('genBtn');
    const loading = document.getElementById('loading');
    const quizArea = document.getElementById('quizArea');
    const analysisBlock = document.getElementById('analysisBlock');

    genBtn.addEventListener('click', async () => {
      loading.classList.remove('hidden');
      quizArea.classList.add('hidden');
      analysisBlock.classList.add('hidden');

      const difficulty = document.getElementById('difficulty').value;
      const category = document.getElementById('category').value;

      try {
        // 連動呼叫你的 Node.js Express 後端端點
        const res = await fetch('/api/toeic/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ difficulty, category })
        });

        const result = await res.json();
        if (!result.success) throw new Error(result.error);
        
        const qData = result.data;

        // 渲染題目
        document.getElementById('qText').innerText = qData.question;
        
        // 渲染選單
        const optBlock = document.getElementById('optionsBlock');
        optBlock.innerHTML = '';
        
        ['A', 'B', 'C', 'D'].forEach(key => {
          optBlock.innerHTML += `
            <button onclick="revealAnswer('${key}', '${qData.answer}')" class="w-full text-left p-3 bg-white border border-slate-200 rounded-xl hover:bg-slate-100 font-mono text-xs text-slate-800 transition flex items-center gap-2">
              <span class="bg-slate-200 text-slate-700 font-bold px-1.5 py-0.5 rounded text-[10px]">${key}</span> ${qData.options[key]}
            </button>
          `;
        });

        // 寫入隱藏的解析內容
        document.getElementById('correctAns').innerText = qData.answer;
        document.getElementById('qTrans').innerText = qData.translation;
        document.getElementById('qExpl').innerText = qData.explanation;

        loading.classList.add('hidden');
        quizArea.classList.remove('hidden');

      } catch (err) {
        alert('出題失敗：' + err.message);
        loading.classList.add('hidden');
      }
    });

    function revealAnswer(userPick, correctAns) {
      analysisBlock.classList.remove('hidden');
      if (userPick === correctAns) {
        alert('🎉 答對了！太厲害了！');
      } else {
        alert(`❌ 答錯囉！這題答案是 (${correctAns})`);
      }
    }
  </script>
</body>
</html>
