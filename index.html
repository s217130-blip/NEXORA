<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Nexora Word-Scanner v3.0</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-800 antialiased p-4 md:p-10 flex justify-center items-start">

  <div class="w-full max-w-5xl bg-white rounded-2xl shadow-sm border border-slate-200 p-5 md:p-8 flex flex-col md:flex-row gap-8 mb-24 md:mb-0">

    <div class="w-full md:w-72 shrink-0 space-y-5">
      <div>
        <h1 class="text-2xl font-black text-slate-950 tracking-tight">Word-Scanner</h1>
        <p class="text-slate-400 text-xs mt-0.5">Nexora 多益出版系統 v3.0 · Gemini AI</p>
      </div>

      <div class="space-y-1.5">
        <label class="block text-xs font-bold text-slate-500 tracking-wider uppercase">輸入英文單字</label>
        <input id="wordInput" type="text" inputmode="search" placeholder="例如：conference, submit..."
               class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-slate-900 focus:bg-white font-mono text-base transition">
        <div id="statusNotice" class="text-xs font-medium text-rose-500 hidden px-1"></div>
      </div>

      <div class="hidden md:flex gap-2">
        <button id="clearBtnPC" class="bg-slate-100 hover:bg-slate-200 text-slate-500 px-4 py-3 rounded-xl text-sm font-medium transition">清除</button>
        <button id="scanBtnPC" class="flex-1 bg-slate-900 hover:bg-slate-800 text-white py-3 rounded-xl font-bold transition text-sm tracking-wide shadow-sm">開始 AI 掃描</button>
      </div>

      <div class="hidden md:block text-[11px] text-slate-400 leading-relaxed border-t border-slate-100 pt-4">
        <p class="font-bold text-slate-500 mb-1">多益出題導向功能</p>
        <p>✦ 高/中/低 頻率標示</p>
        <p>✦ 台灣繁體中文定義</p>
        <p>✦ 商務 / 辦公室情境例句</p>
        <p>✦ X 光字根字首拆解</p>
      </div>
    </div>

    <div class="flex-1 border-t md:border-t-0 md:border-l border-slate-100 pt-5 md:pt-0 md:pl-8 min-h-[300px]">

      <div id="welcomeArea" class="text-slate-300 text-center md:text-left py-16 md:py-24 font-mono text-sm leading-loose">
        📌 輸入單字並點擊掃描開始<br>
        <span class="text-xs text-slate-200">多益導向 · 台灣繁體中文 · 商務情境例句</span>
      </div>

      <div id="loadingArea" class="hidden text-center md:text-left py-16 text-slate-400 text-xs font-mono">
        <span class="inline-block animate-spin mr-2">⏳</span> Gemini AI 分析中，請稍候...
      </div>

      <div id="resultArea" class="hidden space-y-6">

        <div class="flex flex-wrap items-center gap-3 border-b border-slate-100 pb-4">
          <h2 class="text-3xl font-mono font-bold text-slate-950 uppercase tracking-wide" id="resultWord"></h2>
          <span id="resultPhonetic" class="text-sm text-slate-400 font-mono"></span>
          <span id="toeicBadge" class="hidden text-[10px] font-bold px-2 py-1 rounded-full uppercase tracking-wider"></span>
        </div>

        <div>
          <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3">一字多義核心定義（多益導向）</p>
          <div id="meaningsContainer" class="space-y-3"></div>
        </div>

        <div id="etymonAnnotationBlock" class="hidden">
          <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3">X 光字根拆解</p>
          <div id="componentList" class="grid grid-cols-1 sm:grid-cols-2 gap-2"></div>
        </div>

        <div id="exampleBlock" class="hidden">
          <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3">多益情境例句</p>
          <div id="exampleList" class="space-y-3"></div>
        </div>

      </div>

      <div id="errorArea" class="hidden text-center py-12 text-rose-500 text-sm border border-dashed border-rose-200 rounded-xl bg-rose-50/30 px-4">
        ❌ 解析失敗。請確認網路連線正常，且輸入的是純英文單字。
      </div>

    </div>
  </div>

  <div class="md:hidden fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t border-slate-200 p-4 flex justify-center z-50">
    <div class="w-full max-w-md flex gap-2">
      <button id="clearBtnMob" class="bg-slate-100 text-slate-500 px-5 py-3.5 rounded-xl text-sm font-medium">清除</button>
      <button id="scanBtnMob" class="flex-1 bg-slate-900 text-white py-3.5 rounded-xl font-bold text-sm tracking-wide">開始掃描單字</button>
    </div>
  </div>

  <script>
    // ─── 字根字首靜態資料庫 ───────────────────────────────────────────
    const etymonEngine = {
      prefixes: [
        { code: "trans",   mean: "跨越/轉移 (across)"    },
        { code: "contra",  mean: "相反/對抗 (against)"   },
        { code: "inter",   mean: "相互/之間 (between)"   },
        { code: "sub",     mean: "下方/次要 (under)"     },
        { code: "con",     mean: "共同/加強 (together)"  },
        { code: "com",     mean: "共同/一起 (together)"  },
        { code: "dis",     mean: "否定/分離 (not)"       },
        { code: "pre",     mean: "提前/在先 (before)"    },
        { code: "pro",     mean: "向前/支持 (forward)"   },
        { code: "re",      mean: "再次/返回 (again)"     },
        { code: "in",      mean: "進入/否定 (into/not)"  },
        { code: "un",      mean: "不/相反 (not)"         },
        { code: "ex",      mean: "向外/前 (out/former)"  },
        { code: "mis",     mean: "錯誤/不當 (wrongly)"   },
        { code: "over",    mean: "過多/超越 (over)"      },
        { code: "out",     mean: "超越/外部 (beyond)"    }
      ],
      roots: [
        { code: "port",  mean: "搬運/攜帶 (carry)"   },
        { code: "dict",  mean: "言語/說話 (speak)"   },
        { code: "vis",   mean: "看見/視線 (see)"      },
        { code: "spect", mean: "觀看/審視 (look)"    },
        { code: "tract", mean: "拉引/抽取 (pull)"    },
        { code: "press", mean: "擠壓/按壓 (press)"   },
        { code: "duct",  mean: "引導/帶領 (lead)"    },
        { code: "bio",   mean: "生命/生物 (life)"    },
        { code: "geo",   mean: "土地/地球 (earth)"   },
        { code: "log",   mean: "研究/學說 (study)"   },
        { code: "gest",  mean: "攜帶/產生 (carry)"   },
        { code: "ven",   mean: "來/到 (come)"        },
        { code: "mit",   mean: "送出/投遞 (send)"    },
        { code: "pos",   mean: "放置/提出 (place)"   },
        { code: "fer",   mean: "攜帶/承受 (carry)"   },
        { code: "scrib", mean: "書寫/記錄 (write)"   }
      ],
      suffixes: [
        { code: "tion",  mean: "動作或狀態名詞"          },
        { code: "ment",  mean: "結果/行為 (名詞)"         },
        { code: "ize",   mean: "使成為 (動詞化)"          },
        { code: "ise",   mean: "使成為 (動詞化)"          },
        { code: "ible",  mean: "可...的 (形容詞化)"       },
        { code: "able",  mean: "能...的 (形容詞化)"       },
        { code: "er",    mean: "從事者/工具 (名詞化)"     },
        { code: "ous",   mean: "充滿...的 (形容詞化)"     },
        { code: "al",    mean: "具有...特性的"             },
        { code: "ly",    mean: "以...方式 (副詞化)"       },
        { code: "ness",  mean: "狀態/性質 (名詞)"         },
        { code: "ive",   mean: "具有...傾向 (形容詞)"     },
        { code: "ance",  mean: "狀態/行為 (名詞)"         },
        { code: "ence",  mean: "狀態/性質 (名詞)"         },
        { code: "ity",   mean: "性質/狀態 (抽象名詞)"     }
      ]
    };

    const wordInput     = document.getElementById('wordInput');
    const statusNotice  = document.getElementById('statusNotice');
    const welcomeArea   = document.getElementById('welcomeArea');
    const loadingArea   = document.getElementById('loadingArea');
    const resultArea    = document.getElementById('resultArea');
    const errorArea     = document.getElementById('errorArea');

    function clearInput() {
      wordInput.value = '';
      statusNotice.classList.add('hidden');
      resultArea.classList.add('hidden');
      errorArea.classList.add('hidden');
      welcomeArea.classList.remove('hidden');
      wordInput.focus();
    }
    document.getElementById('clearBtnPC').addEventListener('click', clearInput);
    document.getElementById('clearBtnMob').addEventListener('click', clearInput);

    async function masterSearch() {
      const word = wordInput.value.trim().toLowerCase();

      wordInput.blur();
      statusNotice.classList.add('hidden');
      welcomeArea.classList.add('hidden');
      resultArea.classList.add('hidden');
      errorArea.classList.add('hidden');

      if (!word) {
        statusNotice.innerText = '⚠️ 請輸入英文單字。';
        statusNotice.classList.remove('hidden');
        welcomeArea.classList.remove('hidden');
        return;
      }
      if (/[^a-zA-Z]/.test(word)) {
        statusNotice.innerText = '⚠️ 僅支援純英文字母。';
        statusNotice.classList.remove('hidden');
        welcomeArea.classList.remove('hidden');
        return;
      }

      loadingArea.classList.remove('hidden');

      try {
        // 向你自己的 Node.js 後端發送請求，不用在前端暴露出 API Key
        const res = await fetch('/api/search', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ word: word })
        });

        if (!res.ok) throw new Error('Backend server error');
        const ai = await res.json();

        loadingArea.classList.add('hidden');
        resultArea.classList.remove('hidden');

        // 1. 單字名稱與音標
        document.getElementById('resultWord').innerText = ai.word.toUpperCase();
        document.getElementById('resultPhonetic').innerText = ai.phonetic ? `/${ai.phonetic.replace(/\//g, '')}/` : '';

        // 2. 多益核心考頻
        const badge = document.getElementById('toeicBadge');
        const freqMap = {
          high:   { label: '多益高頻', cls: 'bg-rose-100 text-rose-600' },
          medium: { label: '多益中頻', cls: 'bg-amber-100 text-amber-600' },
          low:    { slate: '多益低頻', cls: 'bg-slate-100 text-slate-500' }
        };
        if (ai.toeicFreq && freqMap[ai.toeicFreq]) {
          badge.innerText = freqMap[ai.toeicFreq].label;
          badge.className = `text-[10px] font-bold px-2 py-1 rounded-full uppercase tracking-wider ${freqMap[ai.toeicFreq].cls}`;
          badge.classList.remove('hidden');
        } else {
          badge.classList.add('hidden');
        }

        // 3. 一字多義遍歷渲染
        const meaningsEl = document.getElementById('meaningsContainer');
        meaningsEl.innerHTML = '';
        ai.meanings.forEach(item => {
          meaningsEl.innerHTML += `
            <div class="flex gap-3 border border-slate-200 rounded-xl p-3 bg-slate-50/60 items-start">
              <span class="text-[10px] bg-slate-900 text-white font-mono font-bold px-2 py-1 rounded-md uppercase whitespace-nowrap mt-0.5">${item.pos}</span>
              <div>
                <p class="text-slate-900 font-bold text-sm leading-snug">💡 ${item.zhDef}</p>
                <p class="text-slate-500 text-xs font-mono mt-1 leading-relaxed">📖 ${item.engDef}</p>
              </div>
            </div>`;
        });

        // 4. 前端混合比對：X 光字根字首庫
        const compEl = document.getElementById('componentList');
        const etymBlock = document.getElementById('etymonAnnotationBlock');
        compEl.innerHTML = '';
        let hasAnnotation = false;
        const w = word.toLowerCase();

        etymonEngine.prefixes.forEach(p => { if (w.startsWith(p.code) && w.length > p.code.length + 2) { compEl.innerHTML += makeBadge('字首', p.code + '-', p.mean); hasAnnotation = true; } });
        etymonEngine.roots.forEach(r => { if (w.includes(r.code) && w.length > r.code.length) { compEl.innerHTML += makeBadge('字根', r.code, r.mean); hasAnnotation = true; } });
        etymonEngine.suffixes.forEach(s => { if (w.endsWith(s.code) && w.length > s.code.length + 1) { compEl.innerHTML += makeBadge('字尾', '-' + s.code, s.mean); hasAnnotation = true; } });
        hasAnnotation ? etymBlock.classList.remove('hidden') : etymBlock.classList.add('hidden');

        // 5. AI 多益例句
        const exBlock = document.getElementById('exampleBlock');
        const exList  = document.getElementById('exampleList');
        exList.innerHTML = '';
        if (ai.examples && ai.examples.length > 0) {
          exBlock.classList.remove('hidden');
          ai.examples.forEach((ex, i) => {
            exList.innerHTML += `
              <div class="bg-slate-50 border border-slate-200 rounded-xl p-3 text-xs space-y-1.5">
                <div class="flex items-center justify-between">
                  <span class="text-slate-400 font-mono text-[10px]">情境例句 ${i + 1} · ${ex.pos}</span>
                  <span class="bg-slate-200 text-slate-600 text-[10px] px-2 py-0.5 rounded">${ex.tag || '商務應用'}</span>
                </div>
                <p class="text-slate-800 font-mono italic leading-relaxed">"${ex.eng}"</p>
                <p class="text-slate-500 border-t border-slate-200 pt-1.5">💡 ${ex.zht}</p>
              </div>`;
          });
        } else {
          exBlock.classList.add('hidden');
        }

        window.scrollTo({ top: 0, behavior: 'smooth' });

      } catch (err) {
        console.error(err);
        loadingArea.classList.add('hidden');
        errorArea.classList.remove('hidden');
      }
    }

    function makeBadge(label, code, mean) {
      return `
        <div class="bg-white p-2.5 rounded-lg border border-slate-200 flex justify-between items-center">
          <span class="font-mono font-bold text-slate-900 text-xs">${code} <span class="text-[10px] font-normal text-slate-400">(${label})</span></span>
          <span class="text-slate-500 text-[11px]">${mean}</span>
        </div>`;
    }

    document.getElementById('scanBtnPC').addEventListener('click', masterSearch);
    document.getElementById('scanBtnMob').addEventListener('click', masterSearch);
    wordInput.addEventListener('keypress', e => { if (e.key === 'Enter') masterSearch(); });
  </script>
</body>
</html>
