<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexora Word-Scanner v2.5 (Gemini AI Powered)</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-800 antialiased selection:bg-slate-200 p-4 md:p-12 flex justify-center items-start">

    <div class="w-full max-w-5xl bg-white rounded-2xl shadow-sm border border-slate-200/80 p-5 md:p-8 flex flex-col md:flex-row gap-8 mb-20 md:mb-0">
        
        <div class="w-full md:w-80 shrink-0 space-y-5">
            <div>
                <h1 class="text-2xl font-black text-slate-950 tracking-tight">Word-Scanner</h1>
                <p class="text-slate-400 text-xs mt-0.5">Nexora 雙端響應式出版系統 v2.5</p>
            </div>

            <div class="space-y-2">
                <label class="block text-xs font-bold text-slate-500 tracking-wider">輸入英文單字：</label>
                <input id="wordInput" type="text" inputmode="search" placeholder="例如: cat, transport, initially..." 
                       class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-slate-900 focus:bg-white font-mono text-base transition">
                <div id="statusNotice" class="text-xs font-medium text-rose-500 hidden px-1"></div>
            </div>

            <div class="hidden md:flex gap-2">
                <button id="clearBtnPC" class="bg-slate-100 hover:bg-slate-200 text-slate-500 px-4 rounded-xl text-sm font-medium transition">清除</button>
                <button id="scanBtnPC" class="flex-1 bg-slate-900 hover:bg-slate-800 text-white py-3 rounded-xl font-bold transition text-sm tracking-wide shadow-sm">開始 AI 掃描</button>
            </div>
        </div>

        <div class="flex-1 border-t md:border-t-0 md:border-l border-slate-100 pt-5 md:pt-0 md:pl-8 min-h-[200px]">
            
            <div id="welcomeArea" class="text-slate-300 text-center md:text-left py-12 md:py-24 font-mono text-sm">
                📌 請在左側輸入單字並點擊掃描開始 (Gemini AI 驅動)
            </div>

            <div id="loadingArea" class="hidden text-center md:text-left py-12 text-slate-400 text-xs font-mono animate-pulse">
                🔍 Connecting Gemini AI Intelligence Engine...
            </div>

            <div id="resultArea" class="hidden space-y-6 animate-fadeIn">
                
                <div class="flex items-baseline justify-between border-b border-slate-100 pb-3">
                    <div class="flex items-baseline gap-3">
                        <h3 class="text-3xl font-mono font-bold text-slate-950 uppercase tracking-wide" id="resultWord">WORD</h3>
                        <span id="resultPhonetic" class="text-sm text-slate-400 font-mono">/音標/</span>
                    </div>
                </div>
                
                <div class="space-y-4">
                    <span class="text-[9px] font-bold text-slate-400 block uppercase tracking-wider">AI Multifaceted Definitions (一字多義核心檢索)</span>
                    <div id="meaningsContainer" class="space-y-4"></div>
                </div>

                <div class="bg-slate-50/50 border border-slate-200/60 p-4 rounded-xl space-y-2 hidden" id="etymonAnnotationBlock">
                    <span class="text-[9px] text-slate-400 block uppercase font-mono tracking-wider">X 光結構加註 (Etymology)</span>
                    <div id="componentList" class="grid grid-cols-1 sm:grid-cols-2 gap-2 text-xs"></div>
                </div>
                
                <div id="exampleBlock" class="space-y-3 hidden">
                    <span class="text-[9px] font-bold text-slate-400 block uppercase tracking-wider">AI Contextual Use Cases (AI 智慧情境例句)</span>
                    <div id="exampleList" class="space-y-3"></div>
                </div>

            </div>

            <div id="errorArea" class="hidden text-center py-12 text-rose-500 text-sm border border-dashed border-rose-200 rounded-xl bg-rose-50/30">
                ❌ AI 解析失敗，請確認網路連線或 API Key 是否正確。
            </div>
        </div>
    </div>

    <div class="md:hidden fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-md border-t border-slate-200/60 p-4 flex justify-center z-50">
        <div class="w-full max-w-md flex gap-2">
            <button id="clearBtnMob" class="bg-slate-100 text-slate-500 px-5 rounded-xl text-sm font-medium transition">清除</button>
            <button id="scanBtnMob" class="flex-1 bg-slate-900 text-white py-3.5 rounded-xl font-bold transition text-sm tracking-wide">開始掃描單字</button>
        </div>
    </div>

    <script>
        // 設定你的 Gemini API 金鑰 (請至 Google AI Studio 免費申請)
        const GEMINI_API_KEY = 'curl "https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent" \
  -H 'Content-Type: application/json' \
  -H 'X-goog-api-key: AQ.Ab8RN6LoLK9l5Ot8eWssbuP71NNLOA2JOgWdgqeX11yjehzXbg' \
  -X POST \
  -d '{
    "contents": [
      {
        "parts": [
          {
            "text": "Explain how AI works in a few words"
          }
        ]
      }
    ]
  }'';

        const etymonEngine = {
            prefixes: [
                { code: "trans", mean: "跨越/轉移 (across)" }, { code: "contra", mean: "相反/對抗 (against)" },
                { code: "inter", mean: "相互/之間 (between)" }, { code: "sub", mean: "下方/次要 (under)" },
                { code: "con", mean: "共同/加強 (together)" }, { code: "com", mean: "共同/一起 (together)" },
                { code: "dis", mean: "否定/分離 (not)" }, { code: "pre", mean: "提前/在先 (before)" },
                { code: "pro", mean: "向前/支持 (forward)" }, { code: "re", mean: "再次/返回 (again)" },
                { code: "in", mean: "進入/否定 (into/not)" }, { code: "un", mean: "不/相反 (not)" }
            ],
            roots: [
                { code: "port", mean: "搬運/攜帶 (carry)" }, { code: "dict", mean: "言語/說話 (speak)" },
                { code: "vis", mean: "看見/視線 (see)" }, { code: "spect", mean: "觀看/審視 (look)" },
                { code: "scrib", mean: "書寫/記錄 (write)" }, { code: "script", mean: "書寫/文本 (write)" },
                { code: "tract", mean: "拉引/抽取 (pull)" }, { code: "press", mean: "擠壓/按壓 (press)" },
                { code: "duct", mean: "引導/帶領 (lead)" }, { code: "bio", mean: "生命/生物 (life)" },
                { code: "geo", mean: "土地/地球 (earth)" }, { code: "log", mean: "研究/學說 (study)" }
            ],
            suffixes: [
                { code: "logy", mean: "學科/研究 (study of)" }, { code: "tion", mean: "動作或狀態名詞" },
                { code: "ize", mean: "使成為 (動詞化)" }, { code: "ible", mean: "可...的 (形容詞化)" },
                { code: "able", mean: "能...的 (形容詞化)" }, { code: "er", mean: "從事者/工具 (名詞化)" },
                { code: "ous", mean: "充滿...的 (形容詞化)" }, { code: "al", mean: "具有...特性的" }
            ]
        };

        const wordInput = document.getElementById('wordInput');
        const statusNotice = document.getElementById('statusNotice');

        function clearInput() { wordInput.value = ''; wordInput.focus(); }
        document.getElementById('clearBtnPC').addEventListener('click', clearInput);
        document.getElementById('clearBtnMob').addEventListener('click', clearInput);

        async function masterSearch() {
            const word = wordInput.value.trim().toLowerCase();
            wordInput.blur();

            statusNotice.classList.add('hidden');
            document.getElementById('welcomeArea').classList.add('hidden');
            document.getElementById('resultArea').classList.add('hidden');
            document.getElementById('errorArea').classList.add('hidden');
            document.getElementById('exampleBlock').classList.add('hidden');
            document.getElementById('etymonAnnotationBlock').classList.add('hidden');

            if (!word) { statusNotice.innerText = "⚠️ 請輸入英文單字。"; statusNotice.classList.remove('hidden'); return; }
            if (/[^a-zA-Z]/.test(word)) { statusNotice.innerText = "⚠️ 僅支援純英文字母。"; statusNotice.classList.remove('hidden'); return; }

            document.getElementById('loadingArea').classList.remove('hidden');

            try {
                // 建構強大的 AI 提示詞，逼迫 Gemini 回傳精準的一字多義與地道翻譯 JSON
                const prompt = `你是一個極度精準的英漢字典出版系統。請分析英文單字 "${word}"。
針對一字多義（多重詞性與核心含義）進行精準的在地化繁體中文（台灣）翻譯，特別注意像 initially 這類副詞或多義字，必須給出符合真實語境、優雅的字典定義，絕不能生硬直譯。
另外，請針對各個核心詞性，人工智慧生成一個日常或學術出版級的實用英文例句，並附上精準中文對照。

請嚴格以下列 JSON 格式回傳，不要包含任何 markdown 標記（如 \`\`\`json）：
{
  "word": "${word}",
  "phonetic": "KK音標或國際音標",
  "meanings": [
    {
      "pos": "詞性 (如 adv., n., v., adj.)",
      "zhDef": "精準繁體中文定義 (如：最初、起初)",
      "engDef": "簡明英文釋義"
    }
  ],
  "examples": [
    {
      "pos": "該例句對應的詞性",
      "eng": "AI生成的實用高階英文例句",
      "zht": "精準的繁體中文翻譯",
      "tag": "情境標籤 (如: 邏輯論述, 日常應用, 商務學術)"
    }
  ]
}`;

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await response.json();
                let rawText = data.candidates[0].content.parts[0].text;
                
                // 清理可能殘留的 markdown 標記
                rawText = rawText.replace(/```json/g, '').replace(/```/g, '').trim();
                const aiResult = JSON.parse(rawText);

                // 渲染畫面
                document.getElementById('loadingArea').classList.add('hidden');
                document.getElementById('resultArea').classList.remove('hidden');
                
                document.getElementById('resultWord').innerText = aiResult.word;
                document.getElementById('resultPhonetic').innerText = aiResult.phonetic ? `/${aiResult.phonetic.replace(/\//g, '')}/` : '';

                // 1. 渲染一字多義
                const meaningsContainer = document.getElementById('meaningsContainer');
                meaningsContainer.innerHTML = '';
                aiResult.meanings.forEach(item => {
                    meaningsContainer.innerHTML += `
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-3 border border-slate-200/60 rounded-xl p-3 bg-slate-50/50">
                            <div class="flex items-center gap-2 md:col-span-1">
                                <span class="text-xs bg-slate-900 text-white font-mono font-bold px-2 py-1 rounded uppercase tracking-wider">${item.pos}</span>
                            </div>
                            <div class="md:col-span-2 space-y-1">
                                <p class="text-slate-900 font-bold text-sm">💡 中文：${item.zhDef}</p>
                                <p class="text-slate-500 text-xs font-mono leading-relaxed">📖 Eng: ${item.engDef}</p>
                            </div>
                        </div>
                    `;
                });

                // 2. 渲染字根字首 (沿用原邏輯)
                const componentList = document.getElementById('componentList');
                componentList.innerHTML = '';
                let hasAnnotation = false;
                etymonEngine.prefixes.forEach(p => { if (word.startsWith(p.code) && word.length > p.code.length) { componentList.innerHTML += createBadgeRow('字首', p.code + '-', p.mean); hasAnnotation = true; } });
                etymonEngine.roots.forEach(r => { if (word.includes(r.code)) { componentList.innerHTML += createBadgeRow('字根', r.code, r.mean); hasAnnotation = true; } });
                etymonEngine.suffixes.forEach(s => { if (word.endsWith(s.code) && word.length > s.code.length) { componentList.innerHTML += createBadgeRow('字尾', '-' + s.code, s.mean); hasAnnotation = true; } });
                if (hasAnnotation) document.getElementById('etymonAnnotationBlock').classList.remove('hidden');

                // 3. 渲染 AI 智慧例句
                const exampleListContainer = document.getElementById('exampleList');
                exampleListContainer.innerHTML = '';
                if (aiResult.examples && aiResult.examples.length > 0) {
                    document.getElementById('exampleBlock').classList.remove('hidden');
                    aiResult.examples.forEach((ex, index) => {
                        exampleListContainer.innerHTML += `
                            <div class="bg-slate-50 p-3 rounded-xl border border-slate-200/60 text-xs space-y-1">
                                <div class="flex items-center justify-between text-[9px] text-slate-400 font-bold">
                                    <span>AI 智慧語境 ${index + 1} (${ex.pos})</span>
                                    <span class="bg-slate-200/80 px-1 py-0.2 rounded text-slate-500">${ex.tag || '日常應用'}</span>
                                </div>
                                <p class="text-slate-800 font-mono italic">"${ex.eng}"</p>
                                <p class="text-slate-500 font-medium pt-0.5 border-t border-slate-200/40">💡 翻譯：${ex.zht}</p>
                            </div>
                        `;
                    });
                }

                window.scrollTo({ top: 0, behavior: 'smooth' });

            } catch (err) {
                console.error(err);
                document.getElementById('loadingArea').classList.add('hidden');
                document.getElementById('errorArea').classList.remove('hidden');
            }
        }

        function createBadgeRow(label, code, mean) {
            return `<div class="bg-white p-2.5 rounded-lg border border-slate-200 flex justify-between items-center">
                <span class="font-mono font-bold text-slate-900">${code} <span class="text-[9px] font-normal text-slate-400">(${label})</span></span>
                <span class="text-slate-500 text-[11px]">${mean}</span>
            </div>`;
        }

        document.getElementById('scanBtnPC').addEventListener('click', masterSearch);
        document.getElementById('scanBtnMob').addEventListener('click', masterSearch);
        wordInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') masterSearch(); });
    </script>
</body>
</html>
